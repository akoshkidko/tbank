<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Т-Банк — Чаты</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #1A1A1A;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Roboto, 'Segoe UI', sans-serif;
    }

    .phone {
      width: 360px;
      height: 800px;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 32px 96px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── Status bar ─────────────────────────── */
    .status-bar {
      height: 24px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 0 16px;
      flex-shrink: 0;
    }
    .status-time { font-size: 12px; font-weight: 600; color: #fff; letter-spacing: 0.2px; }
    .status-right { display: flex; align-items: center; gap: 5px; }
    .battery-pct { font-size: 11px; font-weight: 500; color: #fff; }

    /* ── Screen stack ───────────────────────── */
    .screen-stack { flex: 1; position: relative; overflow: hidden; }

    .screen {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      transition: transform 250ms ease;
      will-change: transform;
    }
    .screen.offright  { transform: translateX(100%); }
    .screen.offleft   { transform: translateX(-28%); }

    /* ── Header ─────────────────────────────── */
    .header {
      padding: 10px 16px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-title { font-size: 34px; font-weight: 700; color: #fff; letter-spacing: -0.5px; line-height: 1; }
    .header-icons { display: flex; align-items: center; gap: 14px; }
    .hicon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

    /* ── Tabs ───────────────────────────────── */
    .tabs-outer { flex-shrink: 0; }
    .tabs {
      display: flex;
      position: relative;
      height: 44px;
    }
    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding-bottom: 2px;
      position: relative;
      min-height: 44px;
    }
    .tab-inner { position: relative; display: inline-flex; align-items: center; }
    .tab-text {
      font-size: 15px;
      font-weight: 400;
      color: #8E8E93;
      transition: color 200ms ease, font-weight 150ms ease;
      white-space: nowrap;
    }
    .tab.active .tab-text { color: #FFDD2D; font-weight: 600; }

    .badge {
      position: absolute;
      top: -7px;
      right: -16px;
      min-width: 18px;
      height: 18px;
      padding: 0 4px;
      background: #FF3B30;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      transition: opacity 180ms ease;
    }
    .badge.gone { display: none; }

    .tab-bar {
      position: absolute;
      bottom: 0;
      height: 2px;
      background: #FFDD2D;
      border-radius: 1px;
      transition: left 250ms ease, width 250ms ease;
    }
    .tabs-divider { height: 0.5px; background: #2C2C2E; }

    /* ── Scrollable list area ───────────────── */
    .list-area {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .list-area::-webkit-scrollbar { display: none; }

    /* ── Quick actions ──────────────────────── */
    .quick-actions {
      display: flex;
      gap: 8px;
      padding: 12px 16px 4px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .quick-actions::-webkit-scrollbar { display: none; }

    .qa-btn {
      flex-shrink: 0;
      height: 56px;
      min-width: 148px;
      border-radius: 14px;
      padding: 0 16px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
      font-size: 14px;
      transition: opacity 120ms ease;
    }
    .qa-btn:active { opacity: 0.72; }
    .qa-btn.primary { background: #FFDD2D; color: #000; font-weight: 600; }
    .qa-btn.secondary { background: #1C1C1E; color: #fff; font-weight: 400; }

    /* ── Chat list item ─────────────────────── */
    .chat-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      height: 72px;
      cursor: pointer;
      transition: background 120ms ease;
    }
    .chat-item:active { background: rgba(255,255,255,0.05); }

    .avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar svg { display: block; }

    .chat-meta { flex: 1; margin-left: 12px; min-width: 0; }
    .chat-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
    .chat-name {
      font-size: 16px; font-weight: 700; color: #fff;
      display: flex; align-items: center; gap: 4px;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      max-width: 195px;
    }
    .chat-date {
      font-size: 14px; color: #8E8E93;
      display: flex; align-items: center; gap: 2px;
      flex-shrink: 0; margin-left: 6px;
    }
    .ticks { color: #0A84FF; font-size: 12px; }
    .chat-preview {
      font-size: 14px; color: #8E8E93;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .green { color: #34C759; font-weight: 600; }

    /* ── Archive row ────────────────────────── */
    .archive-row {
      display: flex; align-items: center;
      padding: 0 16px; height: 56px;
      cursor: pointer; gap: 14px;
      transition: background 120ms ease;
    }
    .archive-row:active { background: rgba(255,255,255,0.05); }
    .archive-row .arc-label { flex: 1; font-size: 16px; color: #8E8E93; }
    .archive-row .arc-arrow { font-size: 22px; color: #3A3A3C; line-height: 1; }

    /* ── Bottom nav ─────────────────────────── */
    .bottom-nav {
      height: 56px;
      background: #1C1C1E;
      border-top: 0.5px solid #2C2C2E;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; cursor: pointer; padding: 6px 0; min-height: 48px;
    }
    .nav-lbl { font-size: 10px; color: #8E8E93; }
    .nav-btn.active .nav-lbl { color: #FFDD2D; }

    /* ── Chat detail screen ─────────────────── */
    .detail-header {
      height: 56px; background: #1C1C1E;
      border-bottom: 0.5px solid #2C2C2E;
      display: flex; align-items: center;
      padding: 0 10px; gap: 4px; flex-shrink: 0;
    }
    .detail-back {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .detail-name {
      flex: 1; text-align: center;
      font-size: 17px; font-weight: 700; color: #fff;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .detail-more {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px; color: #8E8E93;
      letter-spacing: 2px;
    }
    .detail-body {
      flex: 1; overflow-y: auto; padding: 14px 14px 8px;
      display: flex; flex-direction: column; gap: 6px;
      scrollbar-width: none;
    }
    .detail-body::-webkit-scrollbar { display: none; }

    .bubble {
      max-width: 76%; padding: 10px 14px;
      border-radius: 18px; font-size: 15px; line-height: 1.45;
      word-break: break-word;
    }
    .bubble.in  { background: #1C1C1E; color: #fff; border-bottom-left-radius: 4px; align-self: flex-start; }
    .bubble.out { background: #FFDD2D; color: #000; border-bottom-right-radius: 4px; align-self: flex-end; }
    .btime { font-size: 12px; color: #8E8E93; margin-top: 2px; }
    .btime.r { text-align: right; }

    .detail-input-area {
      padding: 8px 12px 10px;
      background: #000;
      display: flex; align-items: center; gap: 8px;
      border-top: 0.5px solid #2C2C2E; flex-shrink: 0;
    }
    .detail-input {
      flex: 1; background: #1C1C1E; border: none;
      border-radius: 22px; padding: 10px 16px;
      font-size: 15px; color: #fff; outline: none;
      font-family: inherit;
    }
    .detail-input::placeholder { color: #8E8E93; }
    .send-btn {
      width: 38px; height: 38px; background: #FFDD2D;
      border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── Placeholder screen ─────────────────── */
    .placeholder-body {
      flex: 1; display: flex; align-items: center; justify-content: center;
    }
    .placeholder-body span { font-size: 24px; color: #8E8E93; }

    @media (max-width: 400px) {
      body { background: #000; align-items: flex-start; }
      .phone { width: 100vw; height: 100svh; border-radius: 0; box-shadow: none; }
    }
  </style>
</head>

  ],
  yuriy: [
    { d: 'out', t: 'Юра, когда поверка счётчиков?' },
    { d: 'in',  t: 'В среду с 10 до 12 подойдёт?' },
    { d: 'out', t: 'Да, договорились 👍' },
  ],
  birthday: [
    { d: 'in',  t: 'В чат отправлен виджет' },
    { d: 'out', t: 'Спасибо большое! 🎉' },
  ],
  maxim: [
    { d: 'out', t: 'За кофе ☕' },
    { d: 'in',  t: 'Получил, спасибо!' },
    { d: 'out', t: '👍' },
  ],
  savings: [
    { d: 'in',  t: 'Алексей Владимирович, ставка по накопительному счёту повышена до 11%' },
    { d: 'out', t: 'Отличная новость!' },
  ],
  andrey: [
    { d: 'in',  t: 'Пополнение +150 ₽' },
    { d: 'out', t: 'Принял, спасибо!' },
  ],
};

/* ────────────────────────── State ───────────────────────── */
let currentTab = 'support';
const badgeVisible = { personal: true, services: true };

/* ────────────────────────── Render ──────────────────────── */
function avatarSVG(chat) {
  return `<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <circle cx="24" cy="24" r="24" fill="${chat.avatarBg}"/>
    ${chat.avatarContent}
  </svg>`;
}

function buildChatItem(id) {
  const c = CHATS[id];
  const ticks = c.ticks ? `<span class="ticks">✓✓&nbsp;</span>` : '';
  const suffix = c.nameSuffix || '';
  const preview = c.previewHtml
    ? `<div class="chat-preview">${c.previewHtml}</div>`
    : `<div class="chat-preview">${c.preview}</div>`;

  return `<div class="chat-item" onclick="openChat('${id}')">
    <div class="avatar">${avatarSVG(c)}</div>
    <div class="chat-meta">
      <div class="chat-row1">
        <div class="chat-name">${c.name}${suffix}</div>
        <div class="chat-date">${ticks}${c.date}</div>
      </div>
      ${preview}
    </div>
  </div>`;
}

function buildQuickActions() {
  return `<div class="quick-actions">
    <button class="qa-btn primary" onclick="openNewSupport(event)">
      <svg width="16" height="15" viewBox="0 0 16 15" fill="none">
        <path d="M14.5 0h-13A1.5 1.5 0 0 0 0 1.5v9A1.5 1.5 0 0 0 1.5 12H4v2.5L7.5 12H14.5A1.5 1.5 0 0 0 16 10.5v-9A1.5 1.5 0 0 0 14.5 0z" fill="#000" fill-opacity=".65"/>
      </svg>
      Новое обращение
    </button>
    <button class="qa-btn secondary" onclick="openChatByName(event,'Консьерж','concierge')">Консьерж</button>
    <button class="qa-btn secondary" onclick="openChatByName(event,'Юрист-консультант','lawyer')">Юрист-консультант</button>
  </div>`;
}

function buildArchiveRow() {
  return `<div class="archive-row" onclick="alert('Архив')">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="1" y="4" width="20" height="4" rx="1" stroke="#8E8E93" stroke-width="1.4"/>
      <path d="M2 8h18v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8z" stroke="#8E8E93" stroke-width="1.4"/>
      <path d="M8.5 12.5h5" stroke="#8E8E93" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span class="arc-label">Архив</span>
    <span class="arc-arrow">›</span>
  </div>`;
}

function renderList(tab) {
  const area = document.getElementById('listArea');
  const cfg = TABS[tab];
  let html = '';
  if (cfg.quick) html += buildQuickActions();
  cfg.ids.forEach(id => { html += buildChatItem(id); });
  html += buildArchiveRow();
  area.innerHTML = html;
}

/* ────────────────────────── Tab logic ───────────────────── */
function switchTab(el, tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;

  if (tab === 'personal' && badgeVisible.personal) {
    document.getElementById('bdgPersonal').classList.add('gone');
    badgeVisible.personal = false;
  }
  if (tab === 'services' && badgeVisible.services) {
    document.getElementById('bdgServices').classList.add('gone');
    badgeVisible.services = false;
  }

  positionBar();
  renderList(tab);
}

function positionBar() {
  const activeTab = document.querySelector('.tab.active');
  if (!activeTab) return;
  const textEl = activeTab.querySelector('.tab-text');
  const tabsRect = document.getElementById('tabsRow').getBoundingClientRect();
  const tabRect  = activeTab.getBoundingClientRect();
  const textRect = textEl.getBoundingClientRect();

  const bar = document.getElementById('tabBar');
  const w = textRect.width + 8;
  const l = (tabRect.left - tabsRect.left) + (tabRect.width - w) / 2;
  bar.style.width = w + 'px';
  bar.style.left  = l + 'px';
}

/* ────────────────────────── Navigation ──────────────────── */
function push(screenId) {
  document.getElementById('sChats').classList.add('offleft');
  document.getElementById('sDetail').classList.add('offright');
  document.getElementById('sPlaceholder').classList.add('offright');
  document.getElementById(screenId).classList.remove('offright');
}

function goBack(targetId) {
  document.getElementById('sChats').classList.remove('offleft');
  document.getElementById('sDetail').classList.add('offright');
  document.getElementById('sPlaceholder').classList.add('offright');
}

function showChats() {
  document.getElementById('sChats').classList.remove('offleft');
  document.getElementById('sDetail').classList.add('offright');
  document.getElementById('sPlaceholder').classList.add('offright');
}

function showPlaceholder(name) {
  document.getElementById('plhText').textContent = name;
  push('sPlaceholder');
}

/* ────────────────────────── Chat open ───────────────────── */
function renderMessages(msgs, greeting) {
  const body = document.getElementById('detailBody');
  if (greeting) {
    body.innerHTML = `<div><div class="bubble in">${greeting}</div></div>`;
    return;
  }
  body.innerHTML = msgs.map(m =>
    `<div><div class="bubble ${m.d}">${m.t}</div></div>`
  ).join('');
  body.scrollTop = body.scrollHeight;
}

function openChat(id) {
  const c = CHATS[id];
  document.getElementById('detailName').textContent = c.name;
  renderMessages(MSGS[id] || []);
  push('sDetail');
}

function openChatByName(e, name, id) {
  e.stopPropagation();
  document.getElementById('detailName').textContent = name;
  const msgs = MSGS[id] || [{ d: 'in', t: 'Здравствуйте! Чем могу помочь?' }];
  renderMessages(msgs);
  push('sDetail');
}

function openNewSupport(e) {
  e.stopPropagation();
  document.getElementById('detailName').textContent = 'Поддержка Premium';
  renderMessages(null, 'Здравствуйте! Чем могу помочь?');
  push('sDetail');
}

/* ────────────────────────── Send msg ────────────────────── */
function sendMsg(btn) {
  const input = btn.previousElementSibling;
  const text = input.value.trim();
  if (!text) return;
  const body = document.getElementById('detailBody');
  const div = document.createElement('div');
  div.innerHTML = `<div class="bubble out">${text}</div>`;
  body.appendChild(div);
  input.value = '';
  body.scrollTop = body.scrollHeight;
}

/* ────────────────────────── Init ────────────────────────── */
renderList('support');
window.addEventListener('load', () => setTimeout(positionBar, 30));
window.addEventListener('resize', positionBar);
</script>
</body>
</html>
