<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Т-Банк — Чаты (интерактивный прототип)</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #000;
      --surface: #1C1C1E;
      --border: #2C2C2E;
      --text: #fff;
      --muted: #8E8E93;
      --accent: #0A84FF;
      --premium: #FFDD2D;
      --green: #34C759;
    }

    body {
      background: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Roboto', 'Segoe UI', sans-serif;
    }

    .phone {
      width: 360px;
      height: 800px;
      background: var(--bg);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 32px 96px rgba(0,0,0,0.75), 0 0 0 1px rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .status-bar {
      height: 26px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 0 16px;
      flex-shrink: 0;
    }
    .status-time { font-size: 12px; font-weight: 600; color: var(--text); }
    .status-right { display: flex; align-items: center; gap: 5px; }
    .battery-pct { font-size: 11px; font-weight: 500; color: var(--text); }

    .screen-stack { flex: 1; position: relative; overflow: hidden; }

    .screen {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      transition: transform 280ms cubic-bezier(0.25, 0.1, 0.25, 1);
      will-change: transform;
    }
    .screen.offright { transform: translateX(100%); }
    .screen.offleft { transform: translateX(-28%); }

    .header {
      padding: 10px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      min-height: 52px;
    }
    .header-title {
      font-size: 34px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.6px;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .header-icons {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex: 0 0 auto;
    }
    .hicon {
      flex: 0 0 40px;
      width: 40px;
      height: 40px;
      min-width: 40px;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 10px;
      transition: opacity 0.15s ease, background 0.15s ease;
    }
    /* Явный квадрат: иначе WebKit/Flex иногда даёт несимметричный bbox и «сплющивает» svg */
    .hicon svg {
      display: block;
      flex: none;
      width: 24px;
      height: 24px;
      min-width: 24px;
      min-height: 24px;
      max-width: 24px;
      max-height: 24px;
      aspect-ratio: 1 / 1;
      overflow: visible;
 }
    .hicon:active { opacity: 0.65; background: rgba(255,255,255,0.06); }

    .quick-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 12px 6px;
      flex-shrink: 0;
    }
    .quick-item {
      flex: 1;
      max-width: 88px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 4px 2px;
      border-radius: 12px;
      transition: opacity 0.12s ease;
    }
    .quick-item:active { opacity: 0.72; }
    .quick-circle {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .quick-label {
      font-size: 11px;
      line-height: 1.2;
      color: var(--muted);
      text-align: center;
      max-width: 84px;
    }

    .chips-wrap {
      padding: 8px 0 4px;
      flex-shrink: 0;
    }
    .chips {
      display: flex;
      gap: 8px;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-family: inherit;
      background: var(--surface);
      color: var(--muted);
      transition: background 0.15s ease, color 0.15s ease;
    }
    .chip.active {
      background: rgba(10, 132, 255, 0.22);
      color: var(--accent);
      font-weight: 600;
    }
    .chip:active { opacity: 0.85; }

    .list-area {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .list-area::-webkit-scrollbar { display: none; }

    .section-title {
      padding: 14px 16px 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.2px;
 }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      min-height: 72px;
      cursor: pointer;
      transition: background 0.12s ease;
    }
    .chat-item:active { background: rgba(255,255,255,0.05); }

    .avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar svg { display: block; }

    .chat-meta { flex: 1; margin-left: 12px; min-width: 0; }
    .chat-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; gap: 8px; }
    .chat-name {
      font-size: 16px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 4px;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      min-width: 0;
    }
    .chat-date {
      font-size: 13px; color: var(--muted);
      display: flex; align-items: center; gap: 2px;
      flex-shrink: 0;
    }
    .ticks { color: var(--accent); font-size: 12px; }
    .chat-preview {
      font-size: 14px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .green { color: var(--green); font-weight: 600; }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 72px;
      transform: translateX(-50%) translateY(12px);
      background: rgba(44,44,46,0.96);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 14px;
      max-width: 300px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 50;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .bottom-nav {
      height: 56px;
      background: var(--surface);
      border-top: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      padding: 6px 0;
      min-height: 48px;
    }
    .nav-btn { color: #8E8E93; }
    .nav-btn.active { color: var(--accent); }
    .nav-lbl { font-size: 10px; color: inherit; opacity: 0.95; }
    .nav-btn.active .nav-lbl { font-weight: 600; }

    .detail-header {
      height: 52px;
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 6px;
      gap: 2px;
      flex-shrink: 0;
    }
    .detail-back {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border-radius: 10px;
    }
    .detail-back:active { background: rgba(255,255,255,0.06); }
    .detail-name {
      flex: 1;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 8px;
    }
    .detail-more {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 18px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: none;
    }
    .detail-body::-webkit-scrollbar { display: none; }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
    }
    .bubble.in {
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .bubble.out {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    .detail-input-area {
      padding: 8px 12px 12px;
      background: var(--bg);
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 0.5px solid var(--border);
      flex-shrink: 0;
    }
    .detail-input {
      flex: 1;
      background: var(--surface);
      border: none;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      font-family: inherit;
    }
    .detail-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .send-btn:active { opacity: 0.85; }

    .ph-header {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }
    .ph-back {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--accent);
      font-size: 17px;
      font-weight: 500;
    }
    .ph-title {
      flex: 1;
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      padding-right: 44px;
    }
    .ph-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px;
      color: var(--muted);
      font-size: 15px;
      text-align: center;
      line-height: 1.5;
    }

    @media (max-width: 400px) {
      body { background: var(--bg); align-items: flex-start; }
      .phone { width: 100vw; height: 100svh; border-radius: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span class="status-time">15:05</span>
    <div class="status-right">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="none" aria-hidden="true">
        <rect x="0" y="6" width="3" height="5" rx=".5" fill="#fff"/>
        <rect x="4.5" y="3.5" width="3" height="7.5" rx=".5" fill="#fff"/>
        <rect x="9" y="1" width="3" height="10" rx=".5" fill="#fff"/>
        <rect x="13.5" y="0" width="3" height="11" rx=".5" fill="rgba(255,255,255,.28)"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" aria-hidden="true">
        <circle cx="8" cy="10.5" r="1.5" fill="#fff"/>
        <path d="M4.3 7.7A5.24 5.24 0 0 1 8 6.1c1.42 0 2.72.56 3.67 1.56L12.9 6.4A6.97 6.97 0 0 0 8 4.1c-1.9 0-3.63.76-4.9 2l1.2 1.6z" fill="#fff"/>
      </svg>
      <span class="battery-pct">88</span>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none" aria-hidden="true">
        <rect x=".5" y=".5" width="21" height="11" rx="2.5" stroke="rgba(255,255,255,.35)"/>
        <rect x="1.5" y="1.5" width="17" height="9" rx="1.5" fill="#fff"/>
        <path d="M23 4v4a2 2 0 0 0 0-4z" fill="rgba(255,255,255,.4)"/>
      </svg>
    </div>
  </div>

  <div class="screen-stack">
    <!-- Список чатов -->
    <div class="screen" id="sChats">
      <div class="header">
        <span class="header-title">Чаты</span>
        <div class="header-icons">
          <div class="hicon" id="btnBell" role="button" tabindex="0" aria-label="Уведомления">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" aria-hidden="true" preserveAspectRatio="xMidYMid meet">
              <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="var(--accent)"/>
            </svg>
          </div>
          <div class="hicon" id="btnCompose" role="button" tabindex="0" aria-label="Новое сообщение">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" aria-hidden="true" preserveAspectRatio="xMidYMid meet">
              <rect x="3.5" y="4.5" width="17" height="12" rx="2.5" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
              <path d="M12 8v5M9.5 10.5h5" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="quick-row">
        <div class="quick-item" data-quick="premium" role="button" tabindex="0">
          <div class="quick-circle" style="background:var(--premium)">
            <span style="font-size:22px;font-weight:900;color:#000">T</span>
          </div>
          <span class="quick-label">Поддержка Premium</span>
        </div>
        <div class="quick-item" data-quick="concierge" role="button" tabindex="0">
          <div class="quick-circle" style="background:#3A3A3C">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 3l8 4v6c0 5-3.5 9-8 10-4.5-1-8-5-8-10V7l8-4z" stroke="#fff" stroke-width="1.4"/><path d="M9 10h6v2H9z" fill="#fff"/></svg>
          </div>
          <span class="quick-label">Консьерж</span>
        </div>
        <div class="quick-item" data-quick="lawyer" role="button" tabindex="0">
          <div class="quick-circle" style="background:#3A3A3C">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M8 4h8v2H8V4zm0 4h8l1 14H7L8 8zm2 3v8h4v-8h-4z" fill="#fff"/></svg>
          </div>
          <span class="quick-label">Юрист-консультант</span>
        </div>
        <div class="quick-item" data-quick="archive" role="button" tabindex="0">
          <div class="quick-circle" style="background:#1a3a5c">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="4" y="6" width="16" height="4" rx="1" stroke="#fff" stroke-width="1.4"/><path d="M5 10h14v9a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-9z" stroke="#fff" stroke-width="1.4"/></svg>
          </div>
          <span class="quick-label">Архив</span>
        </div>
      </div>

      <div class="chips-wrap">
        <div class="chips" role="tablist" aria-label="Фильтр чатов">
          <button type="button" class="chip active" data-filter="all" role="tab" aria-selected="true">Все</button>
          <button type="button" class="chip" data-filter="support" role="tab" aria-selected="false">Новости и сервисы</button>
          <button type="button" class="chip" data-filter="personal" role="tab" aria-selected="false">Личные</button>
        </div>
      </div>

      <div class="list-area" id="listArea"></div>
    </div>

    <!-- Экран чата -->
    <div class="screen offright" id="sDetail">
      <div class="detail-header">
        <div class="detail-back" id="detailBack" role="button" tabindex="0" aria-label="Назад">
          <svg width="11" height="19" viewBox="0 0 11 19" fill="none">
            <path d="M9.5 1.5 1.5 9.5l8 8" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="detail-name" id="detailName">Чат</div>
        <div class="detail-more" id="detailMore" role="button" tabindex="0">···</div>
      </div>
      <div class="detail-body" id="detailBody"></div>
      <div class="detail-input-area">
        <input class="detail-input" id="msgInput" type="text" placeholder="Сообщение…" autocomplete="off">
        <button type="button" class="send-btn" id="btnSend" aria-label="Отправить">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 19V5M5 12l7-7 7 7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Заглушка разделов -->
    <div class="screen offright" id="sPlaceholder">
      <div class="ph-header">
        <div class="ph-back" id="phBack" role="button" tabindex="0">Назад</div>
        <div class="ph-title" id="phTitle">Раздел</div>
      </div>
      <div class="ph-body">
        <span id="phText">Заглушка экрана.</span>
        <span style="font-size:13px;opacity:.85">В прототипе открыт только поток «Чаты».</span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <nav class="bottom-nav" aria-label="Основная навигация">
    <div class="nav-btn" data-nav="home" role="button" tabindex="0">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-7H10v7H5a1 1 0 0 1-1-1v-9.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <span class="nav-lbl">Главная</span>
    </div>
    <div class="nav-btn" data-nav="pay" role="button" tabindex="0">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="2" fill="currentColor"/>
      </svg>
      <span class="nav-lbl">Платежи</span>
    </div>
    <div class="nav-btn" data-nav="city" role="button" tabindex="0">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 3l8.5 6.5L12 14 3.5 9.5 12 3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M3.5 14L12 18.5 20.5 14" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" opacity=".6"/>
      </svg>
      <span class="nav-lbl">Город</span>
    </div>
    <div class="nav-btn active" id="navChat" data-nav="chat" role="button" tabindex="0">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M20 3H4a2 2 0 0 0-2 2v11l4-3h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z" fill="currentColor"/>
      </svg>
      <span class="nav-lbl">Чат</span>
    </div>
    <div class="nav-btn" data-nav="showcase" role="button" tabindex="0">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="nav-lbl">Витрина</span>
    </div>
  </nav>
</div>

<script>
(function () {
  const CHAT_TITLE = {
    premium: 'Поддержка Premium',
    concierge: 'Консьерж',
    lawyer: 'Юрист-консультант',
  };

  const CHATS = {
    travel: {
      section: 'support',
      name: 'Бот Путешествий',
      nameExtra: '<svg width="15" height="15" viewBox="0 0 14 14" style="flex-shrink:0;opacity:.55" aria-hidden="true"><path d="M4.5 2h5a1 1 0 0 1 0 2H6.4l4.3 4.3a1 1 0 0 1-1.4 1.4L5 5.4V8a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1z" fill="#8E8E93"/></svg>',
      preview: 'Ираклион (Крит) – Родос (Греция)',
      date: '15 марта',
      ticks: false,
      avatarBg: '#2196F3',
      avatarInner: '<path d="M28 18.5l-4.5 2.5L16 18 14 21l5.5 3.5-2 5 2 1 3.5-3.5 5.5 3 2-2.5-2.5-9z" fill="#fff"/>',
    },
    birthday: {
      section: 'support',
      name: 'С днем рождения!',
      preview: 'В чат отправлен виджет',
      date: '28 января',
      ticks: false,
      avatarBg: 'linear-gradient(145deg,#6B4EFF,#3D2B7A)',
      avatarInner: '<rect x="14" y="18" width="20" height="14" rx="2.5" fill="#FFD60A"/><path d="M24 18v-5a2.5 2.5 0 0 1 5 0v5M19 13h10" stroke="#B8860B" stroke-width="1.4" fill="none" stroke-linecap="round"/>',
    },
    savings: {
      section: 'support',
      name: 'Копите вместе с Т',
      preview: 'Алексей Владимирович, 11% — новая ставка п…',
      date: '16 сентября 2025',
      ticks: false,
      avatarBg: '#5A5A5C',
      avatarInner: '<circle cx="24" cy="24" r="14" fill="#C7C7CC"/><text x="24" y="29" text-anchor="middle" font-size="18" font-weight="800" fill="#000">T</text><path d="M30 14l4 3-8 5" stroke="#FFDD2D" stroke-width="2" fill="none" stroke-linecap="round"/>',
    },
    yuriy: {
      section: 'personal',
      name: 'Юрий З.',
      preview: 'Поверка счётчиков',
      date: '16 февраля',
      ticks: true,
      avatarBg: '#4A3728',
      avatarInner: '<circle cx="24" cy="20" r="7" fill="#E8C07D"/><path d="M14 34c2-8 20-8 22 0" fill="#6B4423"/><ellipse cx="20" cy="19" rx="1.8" ry="2.2" fill="#222"/><ellipse cx="28" cy="19" rx="1.8" ry="2.2" fill="#222"/>',
    },
    maxim: {
      section: 'personal',
      name: 'Максим Т.',
      preview: 'За кофе',
      date: '28 сентября 2025',
      ticks: true,
      avatarBg: '#3A3A3C',
      avatarInner: '<text x="24" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">МТ</text>',
    },
    andrey: {
      section: 'personal',
      name: 'Андрей Т.',
      previewHtml: '<span>Пополнение </span><span class="green">+150 &#8381;</span>',
      date: '13 сентября 2025',
      ticks: false,
      avatarBg: '#3A3A3C',
      avatarInner: '<text x="24" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">АТ</text>',
    },
  };

  const ORDER = { support: ['travel', 'birthday', 'savings'], personal: ['yuriy', 'maxim', 'andrey'] };

  const MSGS = {
    premium: [
      { d: 'in', t: 'Здравствуйте! Чем могу помочь?' },
      { d: 'out', t: 'Не отображаются счета от Мосэнергосбыт' },
      { d: 'in', t: 'Счета могут временно не отображаться из-за плановых работ. Уже проверяем.' },
    ],
    concierge: [
      { d: 'in', t: 'Консьерж на связи. Чем помочь?' },
      { d: 'out', t: 'Нужен столик в ресторан на вечер' },
      { d: 'in', t: 'Принял заявку, пришлю варианты в течение 15 минут.' },
    ],
    lawyer: [
      { d: 'in', t: 'Юрист-консультант. Опишите ситуацию кратко.' },
      { d: 'out', t: 'Вопрос по договору найма жилья' },
      { d: 'in', t: 'Понял. Нужны дата договора и кратко условия, о которых спор.' },
    ],
    travel: [
      { d: 'in', t: 'Маршрут: Ираклион (Крит) – Родос (Греция)' },
      { d: 'out', t: 'Покажи варианты перелётов' },
      { d: 'in', t: 'Прямой рейс от 4 200 ₽. Забронировать?' },
    ],
    birthday: [
      { d: 'in', t: 'В чат отправлен виджет' },
      { d: 'out', t: 'Спасибо большое!' },
    ],
    savings: [
      { d: 'in', t: 'Алексей Владимирович, ставка по накопительному счёту — 11%.' },
      { d: 'out', t: 'Отличная новость' },
    ],
    yuriy: [
      { d: 'out', t: 'Юра, когда поверка счётчиков?' },
      { d: 'in', t: 'В среду с 10 до 12?' },
      { d: 'out', t: 'Да, договорились' },
    ],
    maxim: [
      { d: 'out', t: 'За кофе' },
      { d: 'in', t: 'Получил, спасибо!' },
    ],
    andrey: [
      { d: 'in', t: 'Пополнение +150 ₽' },
      { d: 'out', t: 'Спасибо!' },
    ],
  };

  let filter = 'all';
  const listArea = document.getElementById('listArea');
  const toastEl = document.getElementById('toast');
  let toastTimer;

  function showToast(text) {
    toastEl.textContent = text;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 2200);
  }

  function avatarHtml(chat) {
    const g = chat.avatarInner;
    if (chat.avatarBg.includes('gradient')) {
      return '<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">' +
        '<defs><linearGradient id="g" x1="0" y1="0" x2="48" y2="48">' +
        '<stop stop-color="#6B4EFF"/><stop offset="1" stop-color="#2D1B4E"/></linearGradient></defs>' +
        '<circle cx="24" cy="24" r="24" fill="url(#g)"/>' + g + '</svg>';
    }
    return '<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">' +
      '<circle cx="24" cy="24" r="24" fill="' + chat.avatarBg + '"/>' + g + '</svg>';
  }

  function itemHtml(id) {
    const c = CHATS[id];
    const ticks = c.ticks ? '<span class="ticks">\u2713\u2713&nbsp;</span>' : '';
    const extra = c.nameExtra || '';
    const preview = c.previewHtml
      ? '<div class="chat-preview">' + c.previewHtml + '</div>'
      : '<div class="chat-preview">' + c.preview + '</div>';
    return '<div class="chat-item" data-open="' + id + '" role="button" tabindex="0">' +
      '<div class="avatar">' + avatarHtml(c) + '</div>' +
      '<div class="chat-meta">' +
      '<div class="chat-row1">' +
      '<div class="chat-name">' + c.name + extra + '</div>' +
      '<div class="chat-date">' + ticks + c.date + '</div></div>' + preview + '</div></div>';
  }

  function renderList() {
    let html = '';
    const showSupport = filter === 'all' || filter === 'support';
    const showPersonal = filter === 'all' || filter === 'personal';

    if (showSupport) {
      html += '<div class="section-title">Новости и сервисы</div>';
      ORDER.support.forEach(function (id) { html += itemHtml(id); });
    }
    if (showPersonal) {
      html += '<div class="section-title">Личные и прочие</div>';
      ORDER.personal.forEach(function (id) { html += itemHtml(id); });
    }
    listArea.innerHTML = html;

    listArea.querySelectorAll('.chat-item').forEach(function (row) {
      row.addEventListener('click', function () { openChat(row.getAttribute('data-open')); });
      row.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openChat(row.getAttribute('data-open')); }
      });
    });
  }

  function setFilter(next) {
    filter = next;
    document.querySelectorAll('.chip').forEach(function (b) {
      const on = b.getAttribute('data-filter') === next;
      b.classList.toggle('active', on);
      b.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    renderList();
  }

  document.querySelectorAll('.chip').forEach(function (btn) {
    btn.addEventListener('click', function () { setFilter(btn.getAttribute('data-filter')); });
  });

  function pushDetail() {
    document.getElementById('sChats').classList.add('offleft');
    document.getElementById('sDetail').classList.remove('offright');
    document.getElementById('sPlaceholder').classList.add('offright');
  }

  function pushPlaceholder(title, subtitle) {
    document.getElementById('phTitle').textContent = title;
    document.getElementById('phText').textContent = subtitle;
    document.getElementById('sChats').classList.add('offleft');
    document.getElementById('sDetail').classList.add('offright');
    document.getElementById('sPlaceholder').classList.remove('offright');
  }

  function showChats() {
    document.getElementById('sChats').classList.remove('offleft');
    document.getElementById('sDetail').classList.add('offright');
    document.getElementById('sPlaceholder').classList.add('offright');
    document.querySelectorAll('.nav-btn').forEach(function (b) { b.classList.remove('active'); });
    document.getElementById('navChat').classList.add('active');
  }

  function openChat(id) {
    const meta = CHATS[id];
    const title = meta ? meta.name : (CHAT_TITLE[id] || id);
    document.getElementById('detailName').textContent = title;
    const body = document.getElementById('detailBody');
    const msgs = MSGS[id] || [];
    body.innerHTML = msgs.map(function (m) {
      return '<div class="bubble ' + m.d + '">' + escapeHtml(m.t) + '</div>';
    }).join('');
    body.scrollTop = body.scrollHeight;
    document.getElementById('msgInput').value = '';
    pushDetail();
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('detailBack').addEventListener('click', showChats);
  document.getElementById('phBack').addEventListener('click', showChats);

  document.getElementById('btnSend').addEventListener('click', function () {
    const input = document.getElementById('msgInput');
    const t = input.value.trim();
    if (!t) return;
    const body = document.getElementById('detailBody');
    const el = document.createElement('div');
    el.className = 'bubble out';
    el.textContent = t;
    body.appendChild(el);
    input.value = '';
    body.scrollTop = body.scrollHeight;
  });

  document.getElementById('msgInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btnSend').click(); }
  });

  document.getElementById('detailMore').addEventListener('click', function () {
    showToast('Меню чата (заглушка)');
  });

  document.getElementById('btnBell').addEventListener('click', function () {
    showToast('Центр уведомлений');
  });

  document.getElementById('btnCompose').addEventListener('click', function () {
    showToast('Выбор контакта для нового чата');
  });

  document.querySelectorAll('.quick-item').forEach(function (el) {
    el.addEventListener('click', function () {
      var q = el.getAttribute('data-quick');
      if (q === 'premium') openChat('premium');
      else if (q === 'concierge') openChat('concierge');
      else if (q === 'lawyer') openChat('lawyer');
      else if (q === 'archive') showToast('Архив чатов');
    });
  });

  var labels = { home: 'Главная', pay: 'Платежи', city: 'Город', showcase: 'Витрина' };
  document.querySelectorAll('.nav-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var nav = btn.getAttribute('data-nav');
      document.querySelectorAll('.nav-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      if (nav === 'chat') {
        showChats();
        return;
      }
      pushPlaceholder(labels[nav] || nav, 'Экран «' + (labels[nav] || nav) + '» в прототипе не реализован.');
    });
  });

  renderList();
})();
</script>
</body>
</html>
